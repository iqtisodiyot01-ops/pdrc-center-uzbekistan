kind = "web"
previewPath = "/"
title = "PDR Center Uzbekistan"
version = "1.0.0"
id = "artifacts/pdrc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18940

[services.development]
run = "pnpm --filter @workspace/pdrc-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdrc-website", "run", "build" ]
publicDir = "artifacts/pdrc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18940"
BASE_PATH = "/"
