packages:
  "framer-motion": "For page transitions, reveal animations, and hover effects in the modern industrial design"
  "zustand": "For managing global authentication and language (UZ/EN/RU) state"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation in forms"
  "clsx": "For conditional class names"
  "tailwind-merge": "For merging tailwind classes"

images:
  - path: "artifacts/pdrc-website/public/images/hero-workshop.png"
    description: "Dark, cinematic automotive workshop interior with bright yellow LED tube lights reflecting off a polished black car hood. Industrial, premium, professional vibe."
    aspect_ratio: "16:9"
  - path: "artifacts/pdrc-website/public/images/pdr-tools.png"
    description: "Close up of professional Paintless Dent Repair (PDR) steel rods and glowing reflection lamps on a dark background. High contrast, sharp, premium."
    aspect_ratio: "16:9"
  - path: "artifacts/pdrc-website/public/images/logo-icon.png"
    description: "Minimalist, aggressive geometric logo for an auto repair center. Colors: Vibrant yellow and dark grey/black. Transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/pdrc-website/public/images/dent-before-after.png"
    description: "Split screen showing a car door with a dent on the left, and perfectly smooth glossy paint on the right under bright inspection lights."
    aspect_ratio: "16:9"

notes:
  - Orval generated hooks require `{ data: payload }` for mutations, e.g. `mutate({ data: { email, password } })`
  - Authentication token stored in localStorage as `pdrc_token`
  - The API path is `/api`
